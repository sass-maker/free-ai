name: Deploy Cloudflare

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/cloudflare-deploy.yml"
      - "src/**"
      - "migrations/**"
      - "site/**"
      - "playground/**"
      - "wrangler.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - "vitest.config.ts"

concurrency:
  group: cloudflare-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Type Check
        run: pnpm run typecheck

      - name: Run Tests
        run: pnpm run test

      - name: Validate Cloudflare deploy secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          missing=()
          test -n "$CLOUDFLARE_API_TOKEN" || missing+=("CLOUDFLARE_API_TOKEN or CF_API_TOKEN")
          test -n "$CLOUDFLARE_ACCOUNT_ID" || missing+=("CLOUDFLARE_ACCOUNT_ID")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Missing GitHub deploy secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy

      - name: Smoke Check
        run: curl --fail --show-error --silent --retry 3 --retry-delay 5 https://free-ai-gateway.sarthakagrawal927.workers.dev/health
