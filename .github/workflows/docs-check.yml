name: Docs Check

on:
  push:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'STATUS.md'
      - 'README.md'
      - 'docs-blume/**'
      - 'scripts/validate-docs.mjs'
      - 'scripts/sync-blume-api-ref.mjs'
      - '.github/workflows/docs-check.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'docs/**'
      - 'AGENTS.md'
      - 'STATUS.md'
      - 'README.md'
      - 'docs-blume/**'
      - 'scripts/validate-docs.mjs'
      - 'scripts/sync-blume-api-ref.mjs'
      - '.github/workflows/docs-check.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Validate docs (broken links + orphans)
        run: node scripts/validate-docs.mjs

  blume-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: docs-blume/package.json

      - name: Install Blume deps
        working-directory: docs-blume
        run: npm install --no-audit --no-fund

      - name: Blume build (presentation smoke)
        working-directory: docs-blume
        run: npm run build
