name = "free-ai-gateway"
main = "src/index.ts"
compatibility_date = "2026-02-14"
workers_dev = true

routes = [
  { pattern = "ai.sassmaker.com/*", zone_name = "sassmaker.com" }
]

assets = { directory = "site/dist", binding = "ASSETS", not_found_handling = "single-page-application", run_worker_first = true }

[limits]
cpu_ms = 10

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "HEALTH_KV"
id = "1fd98758ee084a38a1299cfe84fd1ce9"
preview_id = "63c44d03ec1b45098072b9f911f8bc68"

[durable_objects]
bindings = [
  { name = "HEALTH_DO", class_name = "HealthStateDO" },
  { name = "RATE_LIMIT_DO", class_name = "IpRateLimitDO" },
  { name = "NEURON_BUDGET", class_name = "NeuronBudgetDO" }
]

[[d1_databases]]
binding = "GATEWAY_DB"
database_name = "free-ai-gateway-db"
database_id = "6e9e2880-7f07-487a-8b55-8b486be3fa32"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["HealthStateDO", "IpRateLimitDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["NeuronBudgetDO"]

[vars]
WORKERS_AI_ENABLED = "true"
